<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Press Club - All Issues</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <h1 class="logo">Press Club</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/issues" class="active">All Issues</a></li>
          <li><a href="/about">About Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="content">
      <h2>All Issues</h2>
      <div id="archive-container">
        <p id="archive-status">Loading articles...</p>
      </div>
    </section>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwfBhgdk1FYU5Zt8oWG-5iJvDozoEIdGToR0FEG6Fl6drCmEAQfwS1zQdCiyPb_IKkh/exec';

    fetch(API_URL)
      .then(response => response.json())
      .then(articles => {
        const container = document.getElementById('archive-container');
        container.innerHTML = '';

        if (!Array.isArray(articles) || articles.length === 0) {
          container.innerHTML = '<p>No articles yet — check back soon!</p>';
          return;
        }

        articles.forEach(article => {
          const card = document.createElement('div');
          card.className = 'article-card';
          card.innerHTML = `
            <h4>${article.name}</h4>
            <p>Published: ${new Date(article.date).toLocaleDateString()}</p>
            <a href="${article.viewUrl}" target="_blank" rel="noopener">View PDF</a>
          `;
          container.appendChild(card);
        });
      })
      .catch(err => {
        document.getElementById('archive-container').innerHTML =
          '<p>Could not load articles. Please try again later.</p>';
        console.error(err);
      });
  </script>
</body>
</html>
