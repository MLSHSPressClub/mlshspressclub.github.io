<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Press Club - All Issues</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <h1 class="logo">Press Club</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/issues" class="active">All Issues</a></li>
          <li><a href="/about">About Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="content">
      <h2>All Issues</h2>
      <div id="archive-container"></div>
    </section>
  </main>

  <script>
    fetch('YOUR_APPS_SCRIPT_WEB_APP_URL')
  .then(response => response.json())
  .then(articles => {
    const listContainer = document.getElementById('archive-container');
    articles.forEach(article => {
      const card = document.createElement('div');
      card.className = 'article-card';
      card.innerHTML = `
        <h4>${article.name}</h4>
        <p>Published: ${new Date(article.date).toLocaleDateString()}</p>
        <a href="${article.previewUrl}" target="_blank">View PDF</a>
      `;
      listContainer.appendChild(card);
    });
  });
  </script>
</body>
</html>
