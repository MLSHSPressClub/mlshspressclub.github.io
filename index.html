<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="UTF-8" />
  <meta name="keywords" content="mlshs, mlshs press">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Press Club - Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <h1 class="logo">Press Club</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="/" class="active">Home</a></li>
          <li><a href="/issues">All Issues</a></li>
          <li><a href="/about">About Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="content">
      <h2>Latest Issue</h2>
      <div id="latest-article">
        <h3 id="current-title">Loading latest article...</h3>
        <iframe id="pdf-viewer" src="" width="100%" height="600px" allow="autoplay"></iframe>
      </div>
    </section>

    <section class="signup">
      <h2>Join the Press Club</h2>
      <p>Sign up to contribute articles, artwork, or join our editorial team!</p>

      <form id="join-form" class="signup-form">
        <input type="text"   id="join-name"  name="name"  placeholder="Your Name" required>
        <input type="number" id="join-year"  name="year"  placeholder="Year (e.g. 7)" required min="1" max="13">
        <input type="email"  id="join-email" name="email" placeholder="School Email" required>
        <button type="submit">Submit</button>
      </form>
      <p id="join-status" style="margin-top: 10px;"></p>
    </section>

    <section class="signup">
      <h2>Never Miss an Article</h2>
      <p>Get notified every time a new issue is released.</p>
      <form id="newsletter-form">
        <input type="email" id="newsletter-email" name="email" placeholder="Enter your email" required>
        <button type="submit">Join List</button>
      </form>
      <p id="newsletter-status" style="margin-top: 10px;"></p>
    </section>
  </main>

  <script>
    // Replace this with your Apps Script Web App URL
    const API_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';

    // Load latest article
    fetch(API_URL)
      .then(response => response.json())
      .then(articles => {
        if (Array.isArray(articles) && articles.length > 0) {
          const latest = articles[0];
          document.getElementById('current-title').innerText = latest.name;
          document.getElementById('pdf-viewer').src = latest.previewUrl;
        } else {
          document.getElementById('current-title').innerText = 'No articles yet — check back soon!';
        }
      })
      .catch(err => {
        document.getElementById('current-title').innerText = 'Could not load latest article.';
        console.error(err);
      });

    // Newsletter signup
    document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const emailInput = document.getElementById('newsletter-email');
      const status = document.getElementById('newsletter-status');
      const email = emailInput.value.trim();

      status.style.color = '#666';
      status.innerText = 'Signing you up...';

      try {
        const formData = new FormData();
        formData.append('email', email);

        const res = await fetch(API_URL, { method: 'POST', body: formData });
        const data = await res.json();

        if (data.ok) {
          status.style.color = 'green';
          status.innerText = 'Thanks! You\'re on the list.';
          emailInput.value = '';
        } else {
          status.style.color = 'crimson';
          status.innerText = data.error || 'Something went wrong. Please try again.';
        }
      } catch (err) {
        status.style.color = 'crimson';
        status.innerText = 'Could not sign up right now. Please try again later.';
        console.error(err);
      }
    });

    // Join the Press Club
    document.getElementById('join-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nameEl  = document.getElementById('join-name');
      const yearEl  = document.getElementById('join-year');
      const emailEl = document.getElementById('join-email');
      const status  = document.getElementById('join-status');

      status.style.color = '#666';
      status.innerText = 'Submitting your application...';

      try {
        const formData = new FormData();
        formData.append('action', 'apply');
        formData.append('name',  nameEl.value.trim());
        formData.append('year',  yearEl.value.trim());
        formData.append('email', emailEl.value.trim());

        const res = await fetch(API_URL, { method: 'POST', body: formData });
        const data = await res.json();

        if (data.ok) {
          status.style.color = 'green';
          status.innerText = 'Thanks! Your application has been received — we\'ll be in touch soon.';
          nameEl.value = '';
          yearEl.value = '';
          emailEl.value = '';
        } else {
          status.style.color = 'crimson';
          status.innerText = data.error || 'Something went wrong. Please try again.';
        }
      } catch (err) {
        status.style.color = 'crimson';
        status.innerText = 'Could not submit right now. Please try again later.';
        console.error(err);
      }
    });
  </script>
</body>
</html>
